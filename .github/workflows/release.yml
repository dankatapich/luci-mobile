name: Release

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.2
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Create signing files
        working-directory: android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES_B64: ${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}
        run: |
          set -e

          test -n "$KEYSTORE_B64"
          test -n "$KEY_PROPERTIES_B64"

          echo "$KEYSTORE_B64" | base64 --decode > app/luci_mobile_keystore.jks
          echo "$KEY_PROPERTIES_B64" | base64 --decode > key.properties

          test -f app/luci_mobile_keystore.jks
          test -f key.properties

          echo "Generated key.properties:"
          grep -E '^(storeFile|storePassword|keyAlias|keyPassword)=' key.properties | sed 's/=.*$/=***/'

      - name: Build APK
        run: flutter build apk --release --verbose

      - name: Build App Bundle
        run: flutter build appbundle --release --verbose

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab